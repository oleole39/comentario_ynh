# PostgreSQL database to use. Takes precedence if provided
postgres:
  host: localhost
  port: 5432
  database: __DB_NAME__
  username: __DB_USER__
  password: __DB_PWD__

# SMTP server for sending emails
smtpServer:
  host: localhost
  port: 587
  username: __APP__@__DOMAIN__
  password: __MAIL_PWD__

idp:
  # Each of the providers below can be disabled by setting the `disable` field to `true`
  facebook:
    disable: true
    key:
    secret:
  github:
    disable: true
    key:
    secret:
  gitlab:
    disable: true
    key:
    secret:
  google:
    disable: true
    key:
    secret:
  twitter:
    disable: true
    key:
    secret:

extensions:
  # Each of the extensions will be available to domain owners unless explicitly disabled. If the API key is not
  # provided at the instance level, domain owner will need to specify their own API key for each domain
  akismet:
    disable: false
    key:

  perspective:
    disable: false
    key:

  apiLayerSpamChecker:
    disable: false
    key:
